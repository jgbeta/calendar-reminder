services:
  calendar-slack-bot:
    container_name: calendar-reminder
    build: .
    restart: always
    user: "${CALENDAR_BOT_UID:-1000}:${CALENDAR_BOT_GID:-1000}"
    env_file: .env
    environment:
      PYTHONPATH: /app/src
      HEADLESS: "true"
      GOOGLE_CREDENTIALS_PATH: /run/secrets/google_credentials.json
      GOOGLE_TOKEN_PATH: /data/token.json
      GOOGLE_SYNC_STATE_PATH: /data/google-sync-state.json
      CALENDAR_BOT_DB_PATH: /data/calendar-bot.sqlite
    volumes:
      - ./data:/data
    secrets:
      - google_credentials

secrets:
  google_credentials:
    file: ./credentials.json

networks:
  default:
    name: calendar-reminder-default
